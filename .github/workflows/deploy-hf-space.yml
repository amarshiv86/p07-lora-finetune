name: Deploy HF Space

on:
  push:
    branches: [main]
    paths:
      - "hf_space/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install huggingface-hub
        run: pip install huggingface-hub

      - name: Push hf_space/ to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          from huggingface_hub import HfApi
          import os

          api = HfApi(token=os.environ["HF_TOKEN"])

          api.create_repo(
              repo_id="amarshiv86/p07-sre-lora-demo",
              repo_type="space",
              space_sdk="gradio",
              exist_ok=True,
              private=False,
          )

          api.upload_folder(
              folder_path="hf_space",
              repo_id="amarshiv86/p07-sre-lora-demo",
              repo_type="space",
          )
          print("HF Space deployed: amarshiv86/p07-sre-lora-demo")
          EOF
